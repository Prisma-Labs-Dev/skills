name: CI

on:
  push:
    paths:
      - "skills/**"
  pull_request:
    paths:
      - "skills/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skills
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm
          cache-dependency-path: skills/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run ci
